name: medunity
description: MedUnity — Verified Medical Professional Network
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  firebase_messaging: ^15.1.0
  firebase_crashlytics: ^4.1.0
  flutter_local_notifications: ^17.2.3

  # Maps & location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0

  # Misc
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/
